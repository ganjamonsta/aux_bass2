services:
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "127.0.0.1:${HOST_WEB_PORT:-3100}:3000"
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      API_PORT: 4000
    ports:
      - "127.0.0.1:${HOST_API_PORT:-4100}:4000"
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
    restart: unless-stopped
